<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Envialo — Comparte archivos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* =====================================================================
           VARIABLES Y RESET
           ===================================================================== */
        :root {
            --bg:        #0a0a0a;
            --surface:   #111111;
            --border:    #1f1f1f;
            --border-hover: #2e2e2e;
            --text:      #e8e8e8;
            --muted:     #555;
            --accent:    #c8f04e;
            --accent-dim:#8aaa2e;
            --danger:    #ff5f5f;
            --radius:    14px;
            --font:      'DM Sans', sans-serif;
            --mono:      'DM Mono', monospace;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html { height: 100%; }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            /* Fondo con textura sutil */
            background-image: radial-gradient(circle at 20% 20%, #0f1a00 0%, transparent 50%),
                              radial-gradient(circle at 80% 80%, #001a0a 0%, transparent 50%);
        }

        /* =====================================================================
           LOGO / HEADER
           ===================================================================== */
        .logo {
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: -0.05em;
            margin-bottom: 6px;
            animation: fadeDown 0.6s ease both;
        }

        .logo span {
            color: var(--accent);
        }

        .tagline {
            color: var(--muted);
            font-size: 0.85rem;
            font-weight: 300;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            margin-bottom: 40px;
            animation: fadeDown 0.6s 0.1s ease both;
        }

        /* =====================================================================
           CARD PRINCIPAL
           ===================================================================== */
        .card {
            width: 100%;
            max-width: 480px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 32px;
            animation: fadeUp 0.6s 0.2s ease both;
            position: relative;
            overflow: hidden;
        }

        /* Línea decorativa superior */
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            opacity: 0.6;
        }

        /* =====================================================================
           ZONA DRAG & DROP
           ===================================================================== */
        .drop-zone {
            border: 1.5px dashed var(--border-hover);
            border-radius: 10px;
            padding: 48px 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s ease;
            position: relative;
            background: #0d0d0d;
        }

        .drop-zone:hover,
        .drop-zone.dragover {
            border-color: var(--accent);
            background: #0f130a;
        }

        .drop-zone input[type="file"] { display: none; }

        .drop-icon {
            width: 48px;
            height: 48px;
            margin: 0 auto 16px;
            border: 1.5px solid var(--border-hover);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            transition: border-color 0.25s, transform 0.25s;
        }

        .drop-zone:hover .drop-icon {
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .drop-title {
            font-size: 0.95rem;
            font-weight: 500;
            margin-bottom: 4px;
            color: var(--text);
        }

        .drop-sub {
            font-size: 0.78rem;
            color: var(--muted);
            font-weight: 300;
        }

        /* Estado: archivo seleccionado */
        .drop-zone.has-file {
            border-color: var(--accent);
            border-style: solid;
            background: #0f130a;
            padding: 24px;
        }

        .file-preview {
            display: flex;
            align-items: center;
            gap: 14px;
            text-align: left;
        }

        .file-icon-box {
            width: 44px;
            height: 44px;
            background: #1a2200;
            border: 1px solid var(--accent-dim);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .file-name {
            font-size: 0.9rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 280px;
        }

        .file-size {
            font-size: 0.75rem;
            color: var(--muted);
            font-family: var(--mono);
            margin-top: 2px;
        }

        .file-check {
            margin-left: auto;
            color: var(--accent);
            font-size: 1.1rem;
        }

        /* =====================================================================
           INPUTS
           ===================================================================== */
        .input-group {
            margin-top: 14px;
            position: relative;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            background: #0d0d0d;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 0.875rem;
            font-family: var(--font);
            outline: none;
            transition: border-color 0.2s;
        }

        .input-group input:focus {
            border-color: var(--accent-dim);
        }

        .input-group input::placeholder {
            color: #3a3a3a;
        }

        .input-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
            margin-bottom: 6px;
            display: block;
            font-weight: 500;
        }

        /* =====================================================================
           DIVISOR
           ===================================================================== */
        .divider {
            height: 1px;
            background: var(--border);
            margin: 20px 0;
        }

        /* =====================================================================
           BOTÓN PRINCIPAL
           ===================================================================== */
        .btn-send {
            width: 100%;
            padding: 13px;
            background: var(--accent);
            color: #0a0a0a;
            border: none;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            font-family: var(--font);
            cursor: pointer;
            transition: all 0.2s ease;
            display: none;
            letter-spacing: 0.01em;
            margin-top: 14px;
        }

        .btn-send:hover {
            background: #d4f55a;
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(200, 240, 78, 0.2);
        }

        .btn-send:disabled {
            background: #1f1f1f;
            color: var(--muted);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* =====================================================================
           BARRA DE PROGRESO
           ===================================================================== */
        .progress-wrap {
            margin-top: 14px;
            display: none;
        }

        .progress-track {
            height: 3px;
            background: var(--border);
            border-radius: 999px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 999px;
            width: 0%;
            transition: width 0.3s ease;
        }

        .progress-label {
            font-size: 0.75rem;
            color: var(--muted);
            font-family: var(--mono);
            margin-top: 8px;
            text-align: right;
        }

        /* =====================================================================
           RESULTADO EXITOSO
           ===================================================================== */
        .result-box {
            margin-top: 20px;
            background: #0f130a;
            border: 1px solid var(--accent-dim);
            border-radius: 10px;
            padding: 20px;
            display: none;
            animation: fadeUp 0.4s ease both;
        }

        .result-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 14px;
        }

        .result-dot {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .result-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--accent);
            font-weight: 600;
        }

        .link-row {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #0a0a0a;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 14px;
        }

        .link-text {
            flex: 1;
            font-size: 0.78rem;
            font-family: var(--mono);
            color: #888;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .btn-copy {
            padding: 5px 12px;
            background: var(--accent);
            color: #0a0a0a;
            border: none;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            font-family: var(--font);
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .btn-copy:hover { background: #d4f55a; }

        .result-meta {
            display: flex;
            gap: 20px;
            margin-top: 14px;
            flex-wrap: wrap;
        }

        .meta-chip {
            font-size: 0.72rem;
            font-family: var(--mono);
            color: var(--muted);
        }

        .meta-chip strong {
            color: #777;
            font-weight: 500;
        }

        /* =====================================================================
           ALERTA DE ERROR
           ===================================================================== */
        .alert {
            margin-top: 14px;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.82rem;
            display: none;
            animation: fadeUp 0.3s ease;
        }

        .alert-error {
            background: #1a0808;
            border: 1px solid #3d1515;
            color: var(--danger);
        }

        .alert-success {
            background: #0a130a;
            border: 1px solid #1a3d1a;
            color: #6bcf6b;
        }

        /* =====================================================================
           VISTA DE DESCARGA
           ===================================================================== */
        .download-view {
            display: none;
        }

        .download-header {
            margin-bottom: 24px;
        }

        .download-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #0f130a;
            border: 1px solid var(--accent-dim);
            border-radius: 999px;
            padding: 4px 12px;
            font-size: 0.72rem;
            color: var(--accent);
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            margin-bottom: 16px;
        }

        .download-title {
            font-size: 1.3rem;
            font-weight: 600;
            letter-spacing: -0.03em;
            margin-bottom: 4px;
        }

        .download-msg {
            font-size: 0.85rem;
            color: var(--muted);
            font-style: italic;
        }

        .files-list {
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
        }

        .file-row {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
        }

        .file-row:last-child { border-bottom: none; }
        .file-row:hover { background: #111; }

        .file-row-icon {
            width: 36px;
            height: 36px;
            background: #151515;
            border: 1px solid var(--border);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
        }

        .file-row-info { flex: 1; min-width: 0; }

        .file-row-name {
            font-size: 0.875rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-row-size {
            font-size: 0.72rem;
            color: var(--muted);
            font-family: var(--mono);
            margin-top: 2px;
        }

        .btn-dl {
            padding: 7px 16px;
            background: var(--accent);
            color: #0a0a0a;
            border: none;
            border-radius: 7px;
            font-size: 0.8rem;
            font-weight: 600;
            font-family: var(--font);
            cursor: pointer;
            transition: all 0.15s;
            flex-shrink: 0;
        }

        .btn-dl:hover {
            background: #d4f55a;
            transform: translateY(-1px);
        }

        .download-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .expiry-tag {
            font-size: 0.72rem;
            font-family: var(--mono);
            color: var(--muted);
        }

        .dl-count {
            font-size: 0.72rem;
            font-family: var(--mono);
            color: var(--muted);
        }

        /* =====================================================================
           FOOTER
           ===================================================================== */
        .footer {
            margin-top: 28px;
            font-size: 0.72rem;
            color: #2a2a2a;
            letter-spacing: 0.04em;
            text-align: center;
            animation: fadeUp 0.6s 0.4s ease both;
        }

        /* =====================================================================
           ANIMACIONES
           ===================================================================== */
        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.3; }
        }
    </style>
</head>
<body>

    <!-- LOGO -->
    <div class="logo">envia<span>lo</span></div>
    <div class="tagline">Transferencia segura de archivos</div>

    <!-- =====================================================================
         CARD PRINCIPAL
         ===================================================================== -->
    <div class="card">

        <!-- ==================================================================
             VISTA DE DESCARGA — se muestra cuando hay ?token= en la URL
             Llama a: GET /api/v1/file/{token}
             ================================================================== -->
        <div class="download-view" id="downloadView">
            <div class="download-header">
                <div class="download-badge">
                    <span>●</span> Archivo disponible
                </div>
                <div class="download-title">Tienes un archivo</div>
                <div class="download-msg" id="dlMessage"></div>
            </div>
            <div class="files-list" id="filesList"></div>
            <div class="download-footer">
                <span class="expiry-tag">Expira: <span id="dlExpires">—</span></span>
                <span class="dl-count"><span id="dlCount">0</span> descargas</span>
            </div>
            <div class="alert alert-error" id="dlAlert"></div>
        </div>

        <!-- ==================================================================
             VISTA DE SUBIDA — se muestra por defecto
             Llama a: POST /api/v1/upload
             ================================================================== -->
        <div id="uploadView">

            <!-- Zona drag & drop -->
            <div class="drop-zone" id="dropZone">
                <input type="file" id="fileInput">
                <div class="drop-icon">↑</div>
                <div class="drop-title">Arrastra tu archivo aquí</div>
                <div class="drop-sub">o haz clic para seleccionar · máx. 100 MB</div>
            </div>

            <div class="divider"></div>

            <!-- Email del destinatario -->
            <div class="input-group">
                <label class="input-label" for="emailInput">Enviar a (opcional)</label>
                <input type="email" id="emailInput" placeholder="correo@ejemplo.com">
            </div>

            <!-- Mensaje -->
            <div class="input-group" style="margin-top:10px;">
                <label class="input-label" for="messageInput">Mensaje (opcional)</label>
                <input type="text" id="messageInput" placeholder="Hola, aquí te mando el archivo..." maxlength="500">
            </div>

            <!-- Botón enviar -->
            <button class="btn-send" id="btnSend">Enviar archivo →</button>

            <!-- Progreso -->
            <div class="progress-wrap" id="progressWrap">
                <div class="progress-track">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="progress-label" id="progressLabel">0%</div>
            </div>

            <!-- Error -->
            <div class="alert alert-error" id="alertError"></div>

            <!-- Resultado -->
            <div class="result-box" id="resultBox">
                <div class="result-header">
                    <div class="result-dot"></div>
                    <div class="result-title">Listo para compartir</div>
                </div>
                <div class="link-row">
                    <span class="link-text" id="resultUrl"></span>
                    <button class="btn-copy" id="btnCopy">Copiar</button>
                </div>
                <div class="result-meta">
                    <div class="meta-chip">archivo <strong id="rFilename"></strong></div>
                    <div class="meta-chip">tamaño <strong id="rSize"></strong></div>
                    <div class="meta-chip">expira <strong id="rExpires"></strong></div>
                    <div class="meta-chip" id="rEmailChip" style="display:none">correo <strong>enviado ✓</strong></div>
                </div>
            </div>

        </div>
    </div>

    <div class="footer">ENVIALO · Archivos eliminados automáticamente al expirar</div>

    <script>
        // =====================================================================
        // CONFIGURACIÓN
        // =====================================================================
        const API = 'http://localhost:8000/api/v1';

        // =====================================================================
        // UTILIDADES
        // =====================================================================
        const fmt = {
            bytes(b) {
                if (b < 1024) return b + ' B';
                if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
                return (b/1048576).toFixed(1) + ' MB';
            },
            date(iso) {
                return new Date(iso).toLocaleString('es-MX', {
                    day:'2-digit', month:'short',
                    hour:'2-digit', minute:'2-digit'
                });
            },
            mime(type) {
                const map = {
                    'image/jpeg':'🖼', 'image/png':'🖼', 'image/gif':'🖼',
                    'application/pdf':'📄', 'application/zip':'📦',
                    'video/mp4':'🎬', 'audio/mpeg':'🎵', 'text/plain':'📝'
                };
                return map[type] || '📎';
            }
        };

        function showError(id, msg) {
            const el = document.getElementById(id);
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 6000);
        }

        // =====================================================================
        // PUNTO 1: POST /api/v1/upload — Subir archivo
        // =====================================================================
        async function uploadFile(file, email, message) {
            const fd = new FormData();
            fd.append('file', file);
            if (message) fd.append('message', message);
            if (email)   fd.append('recipient_email', email);

            document.getElementById('progressWrap').style.display = 'block';
            document.getElementById('btnSend').disabled = true;

            return new Promise((resolve, reject) => {
                const xhr = new XMLHttpRequest();

                xhr.upload.onprogress = e => {
                    if (e.lengthComputable) {
                        const pct = Math.round(e.loaded / e.total * 100);
                        document.getElementById('progressFill').style.width = pct + '%';
                        document.getElementById('progressLabel').textContent = pct + '%';
                    }
                };

                xhr.onload = () => {
                    if (xhr.status === 200) resolve(JSON.parse(xhr.responseText));
                    else {
                        try { reject(new Error(JSON.parse(xhr.responseText).detail)); }
                        catch { reject(new Error('Error al subir el archivo')); }
                    }
                };

                xhr.onerror = () => reject(new Error('Sin conexión con el servidor'));
                xhr.open('POST', `${API}/upload`);
                xhr.send(fd);
            });
        }

        // =====================================================================
        // PUNTO 2: GET /api/v1/file/{token} — Cargar info del transfer
        // =====================================================================
        async function loadTransfer(token) {
            try {
                const res = await fetch(`${API}/file/${token}`);
                if (res.status === 404) { showError('dlAlert', 'Enlace no encontrado.'); return; }
                if (res.status === 410) { showError('dlAlert', 'Este enlace ha expirado.'); return; }
                if (!res.ok) { showError('dlAlert', 'Error al cargar el archivo.'); return; }

                const data = await res.json();

                document.getElementById('uploadView').style.display = 'none';
                document.getElementById('downloadView').style.display = 'block';

                if (data.message) {
                    document.getElementById('dlMessage').textContent = `"${data.message}"`;
                }
                document.getElementById('dlExpires').textContent = fmt.date(data.expires_at);
                document.getElementById('dlCount').textContent = data.download_count;

                const list = document.getElementById('filesList');
                list.innerHTML = '';
                data.files.forEach(f => {
                    const row = document.createElement('div');
                    row.className = 'file-row';
                    row.innerHTML = `
                        <div class="file-row-icon">${fmt.mime(f.mime_type)}</div>
                        <div class="file-row-info">
                            <div class="file-row-name">${f.filename}</div>
                            <div class="file-row-size">${fmt.bytes(f.file_size)}</div>
                        </div>
                        <button class="btn-dl" onclick="downloadFile('${token}','${f.filename}',this)">
                            Descargar
                        </button>
                    `;
                    list.appendChild(row);
                });

            } catch(e) {
                showError('dlAlert', 'Error de conexión.');
            }
        }

        // =====================================================================
        // PUNTO 3: GET /api/v1/download/{token} — Obtener URL firmada
        // =====================================================================
        async function downloadFile(token, filename, btn) {
            const orig = btn.textContent;
            btn.textContent = '…';
            btn.disabled = true;
            try {
                const res = await fetch(`${API}/download/${token}`);
                if (!res.ok) { showError('dlAlert', 'No se pudo generar el enlace.'); return; }
                const files = await res.json();
                const f = files.find(x => x.filename === filename);
                if (f) window.open(f.download_url, '_blank');
            } catch(e) {
                showError('dlAlert', 'Error al descargar.');
            } finally {
                btn.textContent = orig;
                btn.disabled = false;
            }
        }

        // =====================================================================
        // DRAG & DROP
        // =====================================================================
        const dropZone  = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        let selectedFile = null;

        dropZone.addEventListener('click', () => fileInput.click());

        dropZone.addEventListener('dragover', e => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));

        dropZone.addEventListener('drop', e => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files[0]) selectFile(e.dataTransfer.files[0]);
        });

        fileInput.addEventListener('change', () => {
            if (fileInput.files[0]) selectFile(fileInput.files[0]);
        });

        function selectFile(file) {
            selectedFile = file;
            dropZone.classList.add('has-file');
            dropZone.innerHTML = `
                <div class="file-preview">
                    <div class="file-icon-box">📄</div>
                    <div>
                        <div class="file-name">${file.name}</div>
                        <div class="file-size">${fmt.bytes(file.size)}</div>
                    </div>
                    <div class="file-check">✓</div>
                </div>
            `;
            document.getElementById('btnSend').style.display = 'block';
        }

        // =====================================================================
        // ENVIAR
        // =====================================================================
        document.getElementById('btnSend').addEventListener('click', async () => {
            if (!selectedFile) return;
            const email   = document.getElementById('emailInput').value.trim();
            const message = document.getElementById('messageInput').value.trim();

            try {
                const result = await uploadFile(selectedFile, email, message);

                document.getElementById('progressWrap').style.display = 'none';
                document.getElementById('btnSend').style.display = 'none';

                const shareUrl = `${window.location.origin}?token=${result.token}`;
                document.getElementById('resultUrl').textContent = shareUrl;
                document.getElementById('rFilename').textContent = result.filename;
                document.getElementById('rSize').textContent = fmt.bytes(result.file_size);
                document.getElementById('rExpires').textContent = fmt.date(result.expires_at);

                if (result.email_sent) {
                    document.getElementById('rEmailChip').style.display = 'block';
                }

                document.getElementById('resultBox').style.display = 'block';

            } catch(e) {
                document.getElementById('progressWrap').style.display = 'none';
                document.getElementById('btnSend').disabled = false;
                showError('alertError', e.message);
            }
        });

        // =====================================================================
        // COPIAR LINK
        // =====================================================================
        document.getElementById('btnCopy').addEventListener('click', () => {
            const url = document.getElementById('resultUrl').textContent;
            navigator.clipboard.writeText(url).then(() => {
                const btn = document.getElementById('btnCopy');
                btn.textContent = '✓';
                setTimeout(() => btn.textContent = 'Copiar', 2000);
            });
        });

        // =====================================================================
        // INIT — detecta si hay token en la URL
        // =====================================================================
        const token = new URLSearchParams(window.location.search).get('token');
        if (token) loadTransfer(token);
    </script>
</body>
</html>
